name: Android CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    - name: Install libncurses5
      run: |
              sudo apt-get update
              sudo apt-get install -y libncurses5 2>/dev/null || \
              sudo ln -sf /usr/lib/x86_64-linux-gnu/libncurses.so.6 /usr/lib/x86_64-linux-gnu/libncurses.so.5
              sudo ln -sf /usr/lib/x86_64-linux-gnu/libtinfo.so.6 /usr/lib/x86_64-linux-gnu/libtinfo.so.5
    - name: Grant execute permission for gradlew
      run: /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager "platforms;android-23" "build-tools;23.0.1" && chmod +x gradlew 
    - name: set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
        cache: gradle
    - name: Build with Gradle
      run: ./gradlew assembleDebug --debug  --console=plain
    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v6
      with:
          name: my-artifact-name   # The name of the downloadable zip
          path: ./
