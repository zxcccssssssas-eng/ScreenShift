name: Android CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
        cache: gradle
    - uses: actions/checkout@v4
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager "platforms;android-23" && chmod +x gradlew 
    - name: Build with Gradle
      run: ./gradlew assembleDebug --debug
    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v6
      with:
          name: my-artifact-name   # The name of the downloadable zip
          path: ./
